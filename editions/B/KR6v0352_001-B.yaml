body:
  text: 親教師寂靜菩薩造民國赴藏學法僧超一譯如斯自及他不欲苦畏中與自既無差何其不護他出苦求邊際亦求往樂際信根堅固已菩提心亦堅菩薩律儀者方廣大乘出以何為無罪此要處應知我所有身財三世生諸善悉施諸有情此增長淨護為有情受用應施捨身等未護財何來無財誰有施故為眾生用不捨善知識於經常觀察當守護身等此云何護身當離於損害此諸何所得能遠離無果復常時攝念念重極敬生敬者大寂靜知已精進生等持正如如佛說如斯慧遮除外道動心寂靜不動摧滅諸悼舉求堪能凡夫所持應亦生此應持若非世陵懱佛芽如灰覆之火燒獄等有情故勝者戒經若有情不信此應勵力斷此寶雲中說此我守護身藥及底等有於我愛受用煩惱墮成就於善行應作於一切應明如是依此學此受用易守離貪自利熟守護諸善成欽喜亦不應作已不讚揚當畏利恭敬常遠離高舉菩薩亦應作於法除二心身者若調鍊利益受用成大果善育養無觀身似益如其谷若焦病癒且不圓如是雖佛芽煩惱焦不證云何身之口罪煩惱潔淨正覺說斯理無勤惡趣趣應忍應多聞復次應靜處於等持精進應修不淨等以調柔正命應知淨受用具有空悲心能生清淨福於極多應持此少此何作極厭不應生是故應增長云何身增長無懈怠力生具空與悲心施受用增長精進恩惟堅第一精勤作現前悲安置善增應精勤如賢行儀軌作禮等應恭當常修信等慈及念佛等諸時常利生德施不希財總略菩薩者是增長福因能成正斷者不離不放逸正念及正智如理而思惟
